<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <title>SkillSwap AI Offline</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #020617;
        --panel: rgba(15, 23, 42, 0.9);
        --border: rgba(148, 163, 184, 0.16);
        --text: #e2e8f0;
        --muted: #94a3b8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, system-ui, sans-serif;
        background:
          radial-gradient(circle at top, rgba(20, 184, 166, 0.18), transparent 35%),
          radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.18), transparent 30%),
          var(--bg);
        color: var(--text);
      }

      .card {
        width: min(100%, 440px);
        border: 1px solid var(--border);
        background: var(--panel);
        border-radius: 24px;
        padding: 28px;
        box-shadow: 0 24px 80px rgba(2, 6, 23, 0.55);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(20, 184, 166, 0.12);
        color: #5eead4;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 18px 0 10px;
        font-size: 28px;
        line-height: 1.1;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.65;
      }

      .actions {
        display: flex;
        gap: 12px;
        margin-top: 24px;
      }

      a,
      button {
        flex: 1;
        border: 0;
        border-radius: 14px;
        padding: 12px 16px;
        font: inherit;
        cursor: pointer;
        text-align: center;
        text-decoration: none;
      }

      .primary {
        background: linear-gradient(135deg, #14b8a6, #0f766e);
        color: white;
      }

      .secondary {
        background: rgba(30, 41, 59, 0.92);
        color: var(--text);
        border: 1px solid var(--border);
      }

      @media (max-width: 480px) {
        .actions {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="badge">Offline Mode</div>
      <h1>Internet bilan aloqa yo&apos;q</h1>
      <p>
        Siz hozircha tarmoqqa ulanmagansiz. Aloqa tiklangach, ilovani yangilab yana davom etishingiz mumkin.
      </p>
      <div class="actions">
        <button class="primary" type="button" onclick="window.location.reload()">Qayta urinish</button>
        <a class="secondary" href="/">Bosh sahifa</a>
      </div>
    </main>
  </body>
</html>
