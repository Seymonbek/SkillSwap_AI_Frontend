components:
  schemas:
    AIJobPrompt:
      type: object
      properties:
        prompt:
          type: string
          description: 'Mijozning g''oyasi (Masalan: ''Menga Telegram bot kerak'')'
          minLength: 10
      required:
      - prompt
    AIJobPromptRequest:
      type: object
      properties:
        prompt:
          type: string
          minLength: 10
          description: 'Mijozning g''oyasi (Masalan: ''Menga Telegram bot kerak'')'
      required:
      - prompt
    ActionEnum:
      enum:
      - APPROVE
      - REJECT
      type: string
      description: |-
        * `APPROVE` - APPROVE
        * `REJECT` - REJECT
    Activation:
      type: object
      properties:
        uid:
          type: string
        token:
          type: string
      required:
      - token
      - uid
    ActivationRequest:
      type: object
      properties:
        uid:
          type: string
          minLength: 1
        token:
          type: string
          minLength: 1
      required:
      - token
      - uid
    AdminDispute:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/DisputeStatusEnum'
          readOnly: true
        initiator_email:
          type: string
          readOnly: true
        contract_title:
          type: string
          readOnly: true
        contract_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        reason:
          type: string
          title: Nizo sababi (Da'vo matni)
        evidences:
          type: array
          items:
            $ref: '#/components/schemas/AdminDisputeEvidence'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
          title: Yaratilgan vaqt
        resolution:
          readOnly: true
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/DisputeResolutionEnum'
          - $ref: '#/components/schemas/NullEnum'
        resolved_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          title: Hal qilingan vaqt
      required:
      - contract_amount
      - contract_title
      - created_at
      - evidences
      - id
      - initiator_email
      - reason
      - resolution
      - resolved_at
      - status
    AdminDisputeEvidence:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        uploader_email:
          type: string
          readOnly: true
        file:
          type: string
          format: uri
          title: Dalil fayl
        description:
          type: string
          title: Izoh
          maxLength: 255
        created_at:
          type: string
          format: date-time
          readOnly: true
          title: Yaratilgan vaqt
      required:
      - created_at
      - file
      - id
      - uploader_email
    AdminDisputeEvidenceRequest:
      type: object
      properties:
        file:
          type: string
          format: binary
          title: Dalil fayl
        description:
          type: string
          title: Izoh
          maxLength: 255
      required:
      - file
    AdminDisputeRequest:
      type: object
      properties:
