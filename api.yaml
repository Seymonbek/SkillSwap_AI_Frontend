      enum:
      - SUBMITTED
      - APPROVED
      - REVISION_REQUESTED
      - DISPUTED
      type: string
      description: |-
        * `SUBMITTED` - Topshirildi (Mijoz ko'rib chiqmoqda)
        * `APPROVED` - Qabul qilindi (Pul to'landi)
        * `REVISION_REQUESTED` - Qayta ishlash so'raldi
        * `DISPUTED` - Nizoli (Adminlar ko'rmoqda)
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
